<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>休闲种地游戏</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div>金币：<span id="coins">50</span></div>
      <div>当前天数：第 <span id="day">1</span> 天</div>
    </div>

    <div class="hint">
      点空地种植，点成熟作物收获。点「下一天」让作物长大。
    </div>

    <div id="farm" class="farm"></div>

    <div class="bottom-bar">
        <button id="nextDayBtn">下一天</button>
        <button id="plantAllBtn">一键种菜</button>
        <button id="harvestAllBtn">一键收菜</button>
        <div class="info">
          种子价格：<span id="seedCost">5</span> 金币，
          收获奖励：<span id="harvestReward">12</span> 金币
        </div>
      </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
